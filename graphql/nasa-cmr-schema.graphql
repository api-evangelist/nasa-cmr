- point
- polygon
- temporal"""
  granules(params: GranulesInput): GranuleList
  """Returns the list of services associated with the collection."""
  services(params: ServicesInput): ServiceList
  """Returns the list of subscriptions associated with the collection."""
  subscriptions(params: SubscriptionsInput): SubscriptionList
  """Returns the list of tag definitions associated with the collection."""
