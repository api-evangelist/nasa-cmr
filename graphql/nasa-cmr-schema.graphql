"""
NASA Common Metadata Repository (CMR) GraphQL API Schema
Endpoint: https://graphql.earthdata.nasa.gov/api
Introspected: 2026-06-14
"""

"""
The `Boolean` scalar type represents `true` or `false`.
"""
scalar Boolean

"""
The `Float` scalar type represents signed double-precision fractional values as specified by [IEEE 754](https://en.wikipedia.org/wiki/IEEE_floating_point).
"""
scalar Float

"""
The `Int` scalar type represents non-fractional signed whole numeric values. Int can represent values between -(2^31) and 2^31 - 1.
"""
scalar Int

"""
The `JSON` scalar type represents JSON values as specified by [ECMA-404](http://www.ecma-international.org/publications/files/ECMA-ST/ECMA-404.pdf).
"""
scalar JSON

"""
The `String` scalar type represents textual data, represented as UTF-8 character sequences. The String type is most often used by GraphQL to represent free-form human-readable text.
"""
scalar String

"""
DraftConceptType must be one of the enum values.
"""
enum DraftConceptType {
  Citation
  Collection
  Service
  Tool
  Variable
  Visualization
}

enum IdentityType {
  system
  provider
  catalog_item
}

enum OrderOptionScopeType {
  PROVIDER
  SYSTEM
}

enum PermissionUserType {
  guest
  registered
}

interface Relationship {
  """The type of relationship."""
  relationshipType: String
}

"""
PreviewMetadata can be either a Citation, Collection, Service, Tool, Variable or Visualization.
"""
union PreviewMetadata = Citation | Collection | Service | Tool | Variable | Visualization

type Acl {
  """The unique concept id assigned to the Acl."""
  conceptId: String
  """The revision id for the Acl."""
  revisionId: Int
  """The type of identity (provider, system, catalog_item)."""
  identityType: String
  """The name of the Acl."""
  name: String
  """An URL to retrieve the Acl."""
  location: String
  """List of groups and their permissions to the catalog item associated with this Acl."""
  groups: AclGroupList
  """Identifies sets of catalog items (collections and granules) owned by a provider."""
  catalogItemIdentity: CatalogItemIdentity
  """Identifies a system level thing in the CMR."""
  systemIdentity: JSON
  """Identifies a type of object owned by a specific provider."""
  providerIdentity: JSON
  """Returns the list of collections associated with this Acl."""
  collections(params: CollectionsInput): CollectionList
}

type AclGroup {
  """The unique id assigned to the group."""
  id: String
  """The UID of the application that created the group."""
  appUid: String
  """The client ID of the application that created the group."""
  clientId: String
  """Name of the group."""
  name: String
  """Description of the group."""
  description: String
  """Is the group shared."""
  sharedUserGroup: Boolean
  """Who created the group."""
  createdBy: String
  """Tag for the group."""
  tag: String
  """List of members of the group."""
  members: GroupMemberList
  """List of individual permissions this Group has to the Acl."""
  permissions: [String]
  """The type of user this Acl applies to."""
  userType: String
}

type AclGroupList {
  """The number of hits for a given search."""
  count: Int
  """The list of group search results."""
  items: [AclGroup]
}

type AclList {
  """The number of hits for a given search."""
  count: Int
  """Cursor that points to the/a specific position in a list of requested records."""
  cursor: String
  """The list of acl search results."""
  items: [Acl]
}

type AclMutationResponse {
  """The concept id of the draft."""
  conceptId: String!
  """The revision id of the draft."""
  revisionId: String!
}

"""
Associations are supported between any of the following concepts, and can be made to any/from any of the concepts

- Tool
- Variable
- Service
- Collections
- Order Options
"""
type AssociationMutationResponse {
  """The unique id assigned to a CMR concept."""
  conceptId: String
  """The revision id of the Association."""
  revisionId: Int
  """The unique id assigned to the CMR concept associated with this conceptId"""
  associatedConceptId: String
}

type CatalogItemIdentity {
  """Is collection applicable for a ACL"""
  collectionApplicable: Boolean
  """The collection information"""
  collectionIdentifier: JSON
  """Is granule applicable for a ACL"""
  granuleApplicable: Boolean
  """The granule information"""
  granuleIdentifier: JSON
  """The provider id of the permission"""
  providerId: String
}

type Citation {
  """Citation abstract"""
  abstract: String
  """Citation metadata for the resource"""
  citationMetadata: JSON
  """The unique concept id assigned to the citation."""
  conceptId: String!
  """The identifier for the resource, e.g., DOI, ISBN, ARK"""
  identifier: String
  """The type of identifier used"""
  identifierType: String
  """The name of the cited resource"""
  name: String
  """The native id of a to citation."""
  nativeId: String
  """The provider of the citation."""
  providerId: String
  """URI used to resolve the identifier"""
  resolutionAuthority: String
  """List of identifiers that this resource cites, refers to, or is identical to"""
  relatedIdentifiers: JSON
  """Date which the Citation was last updated."""
  revisionDate: String
  """The revision id of the Citation."""
  revisionId: String
  """All revisions of this Citation."""
  revisions: CitationRevisionList
  """GCMD science keywords"""
  scienceKeywords: JSON
  """Raw UMM Metadata of the Citation Record."""
  ummMetadata: JSON
  """Id of the user who modified/published record"""
  userId: String
  """Returns a list of associated collections."""
  collections(params: CollectionsInput): CollectionList
}

type CitationList {
  """The number of hits for a given search."""
  count: Int
  """Cursor that points to the/a specific position in a list of requested records."""
  cursor: String
  """The list of service search results."""
  items: [Citation]
}

type CitationMutationResponse {
  """The unique concept id assigned to the citation."""
  conceptId: String!
  """The revision of the citation."""
  revisionId: String!
}

type CitationRevisionList {
  """The number of hits for a given search."""
  count: Int
  """The list of citation search results."""
  items: [Citation]
}

type Collection {
