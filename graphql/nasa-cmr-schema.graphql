  userId: String
  """The version description of the collection."""
  versionDescription: String
  """The Version of the collection."""
  version: String
  """All revisions of this Collection."""
  revisions: CollectionRevisionList
  """Returns the list of collections related to this collection."""
  relatedCollections(params: RelatedCollectionsInput): RelatedCollectionsList
  """Returns possible duplicate collections based on matching metadata"""
  duplicateCollections: DuplicateCollectionList
  """Returns the list of granules associated with the collection.

